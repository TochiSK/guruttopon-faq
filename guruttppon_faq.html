var navHistory = [];
var currentNode = tree;

function render() {
  var content = document.getElementById('main-content');
  var navBtns = document.getElementById('nav-btns');
  renderBreadcrumb();
  navBtns.style.display = navHistory.length > 0 ? 'flex' : 'none';
  content.innerHTML = '';

  if (currentNode.answer) {
    var box = document.createElement('div');
    box.className = 'answer-box slide-in';
    box.innerHTML = '<div class="answer-label">解決策</div><div class="answer-title">' + currentNode.answer.title + '</div><div class="answer-body">' + currentNode.answer.body + '</div>';
    content.appendChild(box);
    var still = document.createElement('div');
    still.className = 'still-help slide-in';
    still.innerHTML = '上記で解決しない場合は、<a href="https://grt-pon.jp/inquiry" target="_blank">お問い合わせフォーム</a> よりご連絡ください。事務局より回答いたします（平日対応）。';
    content.appendChild(still);
  } else if (currentNode.choices) {
    var box2 = document.createElement('div');
    box2.className = 'question-box slide-in';
    var labelText = navHistory.length === 0 ? 'ご質問' : 'ステップ ' + (navHistory.length + 1);
    box2.innerHTML = '<div class="question-label">' + labelText + '</div><div class="question-text">' + currentNode.q + '</div>';
    var choices = document.createElement('div');
    choices.className = 'choices';
    currentNode.choices.forEach(function(choice) {
      var btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = '<span>' + choice.label + '</span><span class="arrow">›</span>';
      btn.addEventListener('click', function() { selectChoice(choice); });
      choices.appendChild(btn);
    });
    box2.appendChild(choices);
    content.appendChild(box2);
  }
}

function renderBreadcrumb() {
  var bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  navHistory.forEach(function(item, i) {
    var span = document.createElement('span');
    span.className = 'bc-item';
    span.title = item.label;
    span.textContent = item.label;
    bc.appendChild(span);
    var sep = document.createElement('span');
    sep.className = 'bc-sep';
    sep.textContent = '›';
    bc.appendChild(sep);
  });
  if (navHistory.length > 0) {
    var cur = document.createElement('span');
    cur.className = 'bc-current';
    cur.textContent = currentNode.answer ? '解決策' : currentNode.q;
    bc.appendChild(cur);
  }
}

function selectChoice(choice) {
  navHistory.push({ label: choice.label, node: currentNode });
  if (choice.answer) {
    currentNode = { answer: choice.answer };
  } else if (choice.next) {
    currentNode = choice.next;
  }
  render();
  window.scrollTo(0, 0);
}

function goBack() {
  if (navHistory.length > 0) {
    var prev = navHistory.pop();
    currentNode = prev.node;
    render();
    window.scrollTo(0, 0);
  }
}

function reset() {
  navHistory = [];
  currentNode = tree;
  render();
  window.scrollTo(0, 0);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-back').addEventListener('click', goBack);
  document.getElementById('btn-reset').addEventListener('click', reset);
  render();
});
</script>
